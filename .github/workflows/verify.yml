name: verify

# Every claim KAVACH makes is asserted by this suite. If a rule, a threshold or
# a scenario changes and the published numbers no longer hold, this fails.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend-verification:
    name: Digital twin, risk engines, metrics, orchestrator, what-if
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run the full verification suite
        working-directory: backend
        run: python verify.py

  frontend-build:
    name: Control room type-check and production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Offline demo payload contract
        working-directory: frontend
        run: npm run check:offline
      - name: Production build
        working-directory: frontend
        run: npm run build
